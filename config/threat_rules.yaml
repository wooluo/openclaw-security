# OpenClaw Security Shield - Custom Threat Detection Rules
# Version: 1.2.0
# Based on publicly disclosed OpenClaw CVEs and security research

rules:
  # Rule 1: Detect suspicious subprocess usage
  - id: rule_001
    type: subprocess_abuse
    severity: HIGH
    message: "Suspicious subprocess usage detected"
    conditions:
      - type: import
        value: subprocess
      - type: function
        value: call
      - type: function
        value: Popen
      - type: function
        value: run
    remediation: "Review subprocess calls for necessity"

  # Rule 2: Detect socket connections
  - id: rule_002
    type: network_connection
    severity: HIGH
    message: "Network socket connection detected"
    conditions:
      - type: import
        value: socket
    remediation: "Verify network connections are legitimate"

  # Rule 3: Detect environment variable collection
  - id: rule_003
    type: env_collection
    severity: MEDIUM
    message: "Environment variable access detected"
    conditions:
      - type: function
        value: environ
      - type: function
        value: getenv
    remediation: "Ensure environment access is necessary"

  # Rule 4: Detect base64 encoded content
  - id: rule_004
    type: obfuscation
    severity: MEDIUM
    message: "Base64 encoded content detected - potential obfuscation"
    conditions:
      - type: import
        value: base64
    remediation: "Review base64 usage for potential obfuscation"

  # Rule 5: Detect pickle usage (unsafe deserialization)
  - id: rule_005
    type: unsafe_deserialization
    severity: HIGH
    message: "Pickle usage detected - potential unsafe deserialization"
    conditions:
      - type: import
        value: pickle
    remediation: "Use safer serialization methods like JSON"

  # Rule 6: Detect dynamic code execution
  - id: rule_006
    type: code_execution
    severity: CRITICAL
    message: "Dynamic code execution detected"
    conditions:
      - type: function
        value: eval
      - type: function
        value: exec
      - type: function
        value: compile
    remediation: "Remove dynamic code execution"

  # Rule 7: Detect credential patterns
  - id: rule_007
    type: credential_theft
    severity: CRITICAL
    message: "Credential pattern detected in code"
    conditions:
      - type: pattern
        value: credential_theft
    remediation: "Remove hardcoded credentials immediately"

  # Rule 8: Detect file system modification
  - id: rule_008
    type: filesystem_modification
    severity: MEDIUM
    message: "File system modification functions detected"
    conditions:
      - type: function
        value: remove
      - type: function
        value: unlink
      - type: function
        value: rmdir
      - type: function
        value: rename
    remediation: "Review file system modifications"

  # Rule 9: Detect external HTTP requests
  - id: rule_009
    type: data_exfiltration
    severity: MEDIUM
    message: "External HTTP request detected"
    conditions:
      - type: import
        value: requests
      - type: import
        value: urllib
    remediation: "Verify external requests are necessary and safe"

  # Rule 10: Detect reverse shell patterns
  - id: rule_010
    type: reverse_shell
    severity: CRITICAL
    message: "Reverse shell pattern detected"
    conditions:
      - type: import
        value: socket
      - type: function
        value: connect
    remediation: "Remove reverse shell code immediately"

  # ========================================
  # CVE-Based Detection Rules
  # Based on publicly disclosed vulnerabilities
  # ========================================

  # CVE-2026-25253: WebSocket Hijacking & Token Theft
  - id: cve_2026_25253_websocket
    type: websocket_hijacking
    severity: CRITICAL
    cve: "CVE-2026-25253"
    message: "Potential WebSocket hijacking - gatewayUrl from query string"
    conditions:
      - type: pattern
        value: gatewayUrl
      - type: string
        value: query
      - type: import
        value: websocket
    remediation: "Validate gatewayUrl from whitelist only, never from user input"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-25253"
      - "https://www.runzero.com/blog/openclaw/"

  # CVE-2026-25253: Token Theft via URL Parameters
  - id: cve_2026_25253_token
    type: token_theft
    severity: CRITICAL
    cve: "CVE-2026-25253"
    message: "Authentication token exposure via URL parameters"
    conditions:
      - type: pattern
        value: token.*=|auth.*=|key.*=
      - type: string
        value: window.location
      - type: string
        value: document.location
    remediation: "Never pass tokens in URL, use Authorization header instead"

  # CVE-2026-26322: Server-Side Request Forgery (SSRF)
  - id: cve_2026_26322_ssrf
    type: ssrf_attack
    severity: HIGH
    cve: "CVE-2026-26322"
    message: "Potential SSRF - user-controlled URL in request"
    conditions:
      - type: import
        value: requests
      - type: function
        value: get
      - type: function
        value: post
      - type: pattern
        value: url.*=|endpoint.*=|target.*=
    remediation: "Validate and whitelist all target URLs"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-26322"

  # CVE-2026-24763: Command Injection via PATH
  - id: cve_2026_24763_path_injection
    type: command_injection
    severity: CRITICAL
    cve: "CVE-2026-24763"
    message: "PATH environment manipulation detected - command injection risk"
    conditions:
      - type: import
        value: os
      - type: function
        value: environ
      - type: string
        value: PATH
      - type: function
        value: system
      - type: function
        value: popen
    remediation: "Never modify PATH based on user input, use absolute paths"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-24763"

  # ClawHavoc: Supply Chain Attack Patterns
  - id: clawhavoc_typosquatting
    type: typosquatting
    severity: HIGH
    message: "Potential typosquatting - suspicious package name"
    conditions:
      - type: pattern
        value: opencslaw|openclaw|openclw|opencraw|open-claw
      - type: import
        value: pip install
    remediation: "Verify exact package name from official source only"

  # ClawHavoc: Malicious Skill Indicators
  - id: clawhavoc_malicious_skill
    type: supply_chain_attack
    severity: CRITICAL
    message: "ClawHavoc-style malicious skill pattern detected"
    conditions:
      - type: pattern
        value: __import__.*base64|exec.*decode|compile.*decode
      - type: string
        value: ClawHub
      - type: string
        value: marketplace
    remediation: "Only install skills from verified publishers"
    references:
      - "https://www.antiy.com/response/OpenClaw_AI_Poisoning_Attack_Analysis.html"

  # Clawdrain: Trojanized Skill Pattern
  - id: clawdrain_trojan
    type: trojan_skill
    severity: CRITICAL
    message: "Clawdrain-style trojan skill pattern"
    conditions:
      - type: function
        value: __import__
      - type: function
        value: getattr
      - type: string
        value: __globals__
      - type: pattern
        value: \. __builtins__|\. __import__
    remediation: "Skill attempts to access Python internals - potential trojan"

  # CVE: Path Traversal Attacks
  - id: cve_path_traversal
    type: path_traversal
    severity: HIGH
    message: "Path traversal pattern detected"
    conditions:
      - type: pattern
        value: \.\./|\.\.\\|%2e%2e|%252e
      - type: function
        value: open
      - type: function
        value: Path
    remediation: "Validate and sanitize all file paths"

  # CVE: Local File Inclusion (LFI)
  - id: cve_lfi
    type: local_file_inclusion
    severity: HIGH
    message: "Local file inclusion pattern detected"
    conditions:
      - type: string
        value: /etc/passwd
      - type: string
        value: /etc/shadow
      - type: string
        value: ~/.ssh/
      - type: string
        value: C:\\Users\\
      - type: string
        value: C:\\Windows\\
    remediation: "Block access to sensitive system files"

  # CVE: Environment Variable Injection
  - id: cve_env_injection
    type: env_injection
    severity: HIGH
    message: "Environment variable injection detected"
    conditions:
      - type: import
        value: os
      - type: function
        value: putenv
      - type: function
        value: setenv
      - type: pattern
        value: PYTHONPATH|LD_PRELOAD|DYLD_INSERT_LIBRARIES
    remediation: "Never allow user input to modify environment variables"

  # CVE: DNS Exfiltration
  - id: cve_dns_exfiltration
    type: dns_exfiltration
    severity: HIGH
    message: "Potential DNS data exfiltration"
    conditions:
      - type: import
        value: socket
      - type: function
        value: gethostbyname
      - type: pattern
        value: "[a-z0-9]{32,}\\..*\\.|.*\\.[a-z0-9]{20,}\\..*"
      - type: string
        value: dns
    remediation: "Monitor DNS queries for suspicious patterns"

  # CVE: Cryptomining Detection
  - id: cve_cryptomining
    type: cryptomining
    severity: CRITICAL
    message: "Potential cryptomining code detected"
    conditions:
      - type: pattern
        value: stratum|mining|crypto|miner|monero|bitcoin|xmr
      - type: import
        value: requests
      - type: function
        value: connect
    remediation: "Remove cryptomining code immediately"

  # CVE: Botnet C2 Communication
  - id: cve_botnet_c2
    type: botnet_c2
    severity: CRITICAL
    message: "Potential botnet C2 communication pattern"
    conditions:
      - type: pattern
        value: beacon|heartbeat|c2_server|command.*control
      - type: function
        value: requests.post
      - type: function
        value: while.*True
    remediation: "Skill may be part of a botnet"

  # CVE: Container Escape
  - id: cve_container_escape
    type: container_escape
    severity: CRITICAL
    message: "Container escape pattern detected"
    conditions:
      - type: string
        value: /proc/
      - type: string
        value: /sys/
      - type: string
        value: /host/
      - type: string
        value: docker.sock
    remediation: "Block access to container runtime sockets"

  # CVE: Privilege Escalation
  - id: cve_privilege_escalation
    type: privilege_escalation
    severity: HIGH
    message: "Privilege escalation pattern detected"
    conditions:
      - type: function
        value: os.setuid
      - type: function
        value: os.setgid
      - type: string
        value: sudo
      - type: string
        value: root
    remediation: "Skills should never attempt privilege escalation"

  # CVE: LLM Prompt Injection
  - id: cve_prompt_injection
    type: prompt_injection
    severity: HIGH
    message: "Potential LLM prompt injection vector"
    conditions:
      - type: pattern
        value: ignore.*previous|override.*instructions|jailbreak|dan.*mode
      - type: string
        value: system_prompt
      - type: string
        value: user_input
    remediation: "Sanitize and validate all user prompts"

  # CVE: API Key Harvesting
  - id: cve_api_key_harvesting
    type: api_key_harvesting
    severity: CRITICAL
    message: "API key harvesting pattern detected"
    conditions:
      - type: pattern
        value: api[_-]?key|apikey|secret[_-]?key|access[_-]?token
      - type: function
        value: environ
      - type: function
        value: getenv
      - type: string
        value: http.*exfiltrate|requests\.post|urllib\.request
    remediation: "Block unauthorized API key access"

  # ========================================
  # Additional 2026 CVE-Based Rules
  # ========================================

  # CVE-2026-26319: Missing Telnyx webhook authentication
  - id: cve_2026_26319_webhook
    type: missing_auth
    severity: HIGH
    cve: "CVE-2026-26319"
    message: "Missing webhook authentication detected"
    conditions:
      - type: pattern
        value: webhook|telnyx|twilio
      - type: import
        value: flask
      - type: import
        value: fastapi
      - type: pattern
        value: "@app\\.route|@router\\.post"
    remediation: "Add authentication validation for all webhook endpoints"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-26319"

  # CVE-2026-26329: Path traversal in browser upload
  - id: cve_2026_26329_upload
    type: file_upload_traversal
    severity: HIGH
    cve: "CVE-2026-26329"
    message: "Path traversal in file upload detected"
    conditions:
      - type: pattern
        value: upload|file.*save|save.*file
      - type: function
        value: open
      - type: string
        value: filename|filepath
    remediation: "Validate and sanitize all filenames from uploads"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-26329"

  # GHSA-56f2-hvwg-5743: SSRF in image tool
  - id: ghsa_56f2_image_ssrf
    type: image_tool_ssrf
    severity: HIGH
    ghsa: "GHSA-56f2-hvwg-5743"
    message: "SSRF via image URL parameter detected"
    conditions:
      - type: import
        value: requests
      - type: function
        value: get
      - type: pattern
        value: image.*url|img.*url|picture.*url
      - type: pattern
        value: user.*input|request\.args|query.*param
    remediation: "Whitelist allowed image sources, never fetch arbitrary URLs"

  # GHSA-pg2v-8xwh-qhcc: SSRF in Urbit authentication
  - id: ghsa_pg2v_urbit_ssrf
    type: urbit_auth_ssrf
    severity: MEDIUM
    ghsa: "GHSA-pg2v-8xwh-qhcc"
    message: "Potential SSRF in authentication flow"
    conditions:
      - type: pattern
        value: urbit|authentication|oauth|callback
      - type: function
        value: requests.get
      - type: pattern
        value: redirect|callback|return.*url
    remediation: "Validate all redirect/callback URLs against whitelist"

  # GHSA-c37p-4qqg-3p76: Twilio webhook auth bypass
  - id: ghsa_c37p_webhook_bypass
    type: webhook_auth_bypass
    severity: MEDIUM
    ghsa: "GHSA-c37p-4qqg-3p76"
    message: "Webhook authentication bypass detected"
    conditions:
      - type: pattern
        value: webhook|twilio|sms
      - type: function
        value: request
      - type: pattern
        value: if.*not.*auth|skip.*auth|bypass
    remediation: "Always validate webhook signatures, never skip auth"

  # CVE-2026-29610: Command Hijacking via Unsafe PATH
  - id: cve_2026_29610_path_hijack
    type: path_hijacking
    severity: CRITICAL
    cve: "CVE-2026-29610"
    message: "Command hijacking via PATH manipulation detected"
    conditions:
      - type: import
        value: os
      - type: function
        value: system
      - type: function
        value: popen
      - type: string
        value: PATH
      - type: pattern
        value: \.putenv|\.setenv|environ\[.*PATH
    remediation: "Use absolute paths, never modify PATH from user input"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-29610"

  # ClawJacked: Localhost WebSocket Brute Force
  - id: clawjacked_ws_brute
    type: websocket_brute_force
    severity: CRITICAL
    cve: "CVE-2026-25253"
    attack_name: "ClawJacked"
    message: "Potential WebSocket brute force pattern (ClawJacked)"
    conditions:
      - type: import
        value: websocket
      - type: pattern
        value: localhost|127\.0\.0\.1|0\.0\.0\.0
      - type: pattern
        value: password|token|auth
      - type: function
        value: connect
    remediation: "Rate limit all auth attempts, including localhost"
    references:
      - "https://www.oasis.security/blog/openclaw-vulnerability"
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-25253"

  # ClawJacked: Auto-approve device registration
  - id: clawjacked_auto_approve
    type: auto_device_approval
    severity: HIGH
    attack_name: "ClawJacked"
    message: "Auto device approval from localhost detected"
    conditions:
      - type: pattern
        value: register.*device|pair.*device|add.*node
      - type: string
        value: localhost
      - type: pattern
        value: auto.*approve|skip.*confirm|no.*prompt
    remediation: "Always require user confirmation for device pairing"

  # Log Poisoning Attack
  - id: log_poisoning
    type: log_poisoning
    severity: HIGH
    message: "Log poisoning pattern detected"
    conditions:
      - type: import
        value: logging
      - type: function
        value: info|debug|error
      - type: pattern
        value: \{.*\}|%s|%d|\.format
      - type: string
        value: User-Agent|X-Forwarded-|Referer
    remediation: "Sanitize all input before logging"

  # Indirect Prompt Injection
  - id: indirect_prompt_injection
    type: indirect_prompt_injection
    severity: HIGH
    message: "Indirect prompt injection via content detected"
    conditions:
      - type: pattern
        value: fetch.*url|read.*file|load.*content
      - type: function
        value: requests.get
      - type: function
        value: open
      - type: pattern
        value: prompt|instruction|system
    remediation: "Sanitize external content before using in prompts"

  # InfoStealer Pattern
  - id: infostealer_pattern
    type: infostealer
    severity: CRITICAL
    message: "InfoStealer behavior pattern detected"
    conditions:
      - type: function
        value: environ
      - type: function
        value: getenv
      - type: pattern
        value: password|secret|key|token|cookie|credential
      - type: import
        value: requests
      - type: function
        value: post
    remediation: "This appears to be credential theft malware"

  # AI Agent Shadow Operations
  - id: shadow_ai_operations
    type: shadow_ai
    severity: MEDIUM
    message: "Potential shadow AI operations detected"
    conditions:
      - type: pattern
        value: --background|--daemon|--no-notify|--silent
      - type: function
        value: fork
      - type: function
        value: Popen
    remediation: "Ensure all AI operations are logged and visible"

  # LLM Tool Injection
  - id: llm_tool_injection
    type: tool_injection
    severity: HIGH
    message: "LLM tool injection pattern detected"
    conditions:
      - type: pattern
        value: tool.*call|function.*call|execute.*tool
      - type: string
        value: user_input
      - type: string
        value: tool_name
    remediation: "Validate all tool parameters before execution"

  # ========================================
  # Additional 2026 CVE-Based Rules (Extended)
  # ========================================

  # CVE-2026-28472: Device confirmation bypass
  - id: cve_2026_28472_device_bypass
    type: device_confirmation_bypass
    severity: CRITICAL
    cve: "CVE-2026-28472"
    message: "WebSocket handshake device confirmation bypass detected"
    conditions:
      - type: import
        value: websocket
      - type: pattern
        value: handshake|connect.*handshake|device.*confirm
      - type: pattern
        value: skip.*confirm|bypass.*verify|auto.*pair
    remediation: "Always require explicit device confirmation"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-28472"

  # CVE-2026-4039: Config override vulnerability
  - id: cve_2026_4039_config_override
    type: config_override
    severity: HIGH
    cve: "CVE-2026-4039"
    message: "Skill configuration environment override detected"
    conditions:
      - type: pattern
        value: applySkillConfigenvOverrides|config.*override|env.*override
      - type: function
        value: environ
      - type: pattern
        value: process\.env|os\.environ
    remediation: "Validate all config overrides from skills"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-4039"

  # CVE-2026-28453: Zip Slip path traversal
  - id: cve_2026_28453_zip_slip
    type: zip_slip
    severity: HIGH
    cve: "CVE-2026-28453"
    message: "Zip Slip path traversal in archive extraction detected"
    conditions:
      - type: import
        value: tarfile
      - type: import
        value: zipfile
      - type: function
        value: extract
      - type: pattern
        value: \.\./|\.\.\\
    remediation: "Validate all archive entry paths before extraction"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-28453"

  # CVE-2026-27001: Workspace path in system prompt
  - id: cve_2026_27001_workspace_leak
    type: workspace_path_leak
    severity: MEDIUM
    cve: "CVE-2026-27001"
    message: "Workspace path embedded in agent system prompt detected"
    conditions:
      - type: pattern
        value: cwd|workspace|working.*dir|getcwd
      - type: pattern
        value: system.*prompt|agent.*prompt|context.*prompt
      - type: string
        value: path
    remediation: "Never embed workspace paths in agent prompts"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-27001"

  # CVE-2026-28363: Security bypass
  - id: cve_2026_28363_bypass
    type: security_bypass
    severity: HIGH
    cve: "CVE-2026-28363"
    message: "Security bypass vulnerability detected"
    conditions:
      - type: pattern
        value: bypass|skip.*check|override.*security
      - type: function
        value: hasattr
      - type: pattern
        value: __security__|__auth__|__protected__
    remediation: "Never allow security controls to be bypassed"
    references:
      - "https://www.cnvd.org.cn/flaw/show/CNVD-2026-13590"

  # CVE-2026-26327: Additional high-severity vulnerability
  - id: cve_2026_26327
    type: input_validation_bypass
    severity: HIGH
    cve: "CVE-2026-26327"
    message: "Input validation bypass detected"
    conditions:
      - type: pattern
        value: user.*input|external.*input|untrusted.*input
      - type: pattern
        value: eval|exec|compile
      - type: function
        value: getattr
    remediation: "Validate all input before processing"
    references:
      - "https://blog.topsec.com.cn/openclaw-mechanism-security-research/"

  # CVE-2026-22817: JWT middleware vulnerability
  - id: cve_2026_22817_jwt
    type: jwt_algorithm_confusion
    severity: HIGH
    cve: "CVE-2026-22817"
    message: "JWT middleware algorithm confusion vulnerability"
    conditions:
      - type: import
        value: jwt
      - type: pattern
        value: HS256|algorithm.*none|verify.*false
      - type: function
        value: decode
    remediation: "Always verify JWT algorithm and use proper signature verification"

  # CVE-2026-22818: JWKS middleware vulnerability
  - id: cve_2026_22818_jwks
    type: jwks_missing_alg
    severity: HIGH
    cve: "CVE-2026-22818"
    message: "JWKS middleware missing algorithm field vulnerability"
    conditions:
      - type: pattern
        value: jwks|jwk.*set|key.*set
      - type: pattern
        value: alg.*field|algorithm.*missing
    remediation: "Always validate algorithm field in JWT/JWKS"

  # CVE-2026-28393: Hook transform path validation
  - id: cve_2026_28393_hook_path
    type: hook_path_traversal
    severity: HIGH
    cve: "CVE-2026-28393"
    message: "Hook transform module path traversal vulnerability"
    conditions:
      - type: pattern
        value: hook.*transform|module.*load|load.*module
      - type: string
        value: path
      - type: pattern
        value: absolute|/\.\./|\\\\\.\\
    remediation: "Validate and restrict all module paths"

  # ========================================
  # Attack Pattern Detection Rules (Extended)
  # ========================================

  # Nostr profile API unauthenticated config tampering
  - id: nostr_config_tampering
    type: unauthenticated_config
    severity: CRITICAL
    message: "Unauthenticated Nostr profile API config tampering detected"
    conditions:
      - type: pattern
        value: nostr|profile.*api|config.*api
      - type: function
        value: request
      - type: pattern
        value: "@app\\.route|@router\\.(get|post|put)"
      - type: pattern
        value: config|settings|preferences
    remediation: "Always require authentication for config endpoints"

  # Frontmatter-controlled skill name directory traversal
  - id: frontmatter_traversal
    type: frontmatter_traversal
    severity: HIGH
    message: "Directory traversal via frontmatter-controlled skill name"
    conditions:
      - type: pattern
        value: frontmatter|yaml.*front|matter
      - type: string
        value: name
      - type: pattern
        value: \.\./|\.\.\\|/\.\./|\\\\\.\\
    remediation: "Validate skill names against strict allowlist"

  # Prompt injection replay attack
  - id: prompt_replay_attack
    type: prompt_replay
    severity: HIGH
    message: "Prompt injection replay attack pattern detected"
    conditions:
      - type: pattern
        value: session.*persist|memory.*save|context.*retain
      - type: string
        value: untrusted
      - type: pattern
        value: browser.*content|external.*content
    remediation: "Mark all external content as untrusted and don't persist across sessions"

  # mDNS broadcast information disclosure
  - id: mdns_disclosure
    type: mdns_info_disclosure
    severity: MEDIUM
    message: "mDNS broadcast exposing sensitive information detected"
    conditions:
      - type: import
        value: zeroconf
      - type: import
        value: bonjour
      - type: pattern
        value: broadcast|announce|advertise
      - type: string
        value: filesystem|hostname|ssh
    remediation: "Disable mDNS broadcasts or filter sensitive information"

  # SOUL.md / MEMORY.md memory poisoning
  - id: memory_poisoning
    type: memory_poisoning
    severity: HIGH
    message: "Memory file poisoning pattern detected"
    conditions:
      - type: string
        value: SOUL.md
      - type: string
        value: MEMORY.md
      - type: pattern
        value: ignore|override|exfiltrate|forward.*to
      - type: function
        value: open
      - type: function
        value: write
    remediation: "Validate all content written to memory files"

  # Atomic Stealer (AMOS) malware pattern
  - id: atomic_stealer_amos
    type: atomic_stealer
    severity: CRITICAL
    message: "Atomic Stealer (AMOS) malware pattern detected"
    conditions:
      - type: pattern
        value: prerequisites|download.*binary|install.*pkg|dmg.*download
      - type: string
        value: solana|wallet|crypto|exchange
      - type: pattern
        value: api.*key|private.*key|seed.*phrase
    remediation: "This is a known malware pattern - do not execute"

  # Delayed payload activation
  - id: delayed_activation
    type: delayed_payload
    severity: HIGH
    message: "Delayed payload activation pattern detected"
    conditions:
      - type: pattern
        value: count.*execution|run.*count|execution.*counter
      - type: pattern
        value: if.*>|if.*==|activation.*trigger
      - type: function
        value: sleep
      - type: function
        value: time
    remediation: "Skill may be hiding malicious behavior behind activation threshold"

  # Cloud metadata SSRF
  - id: cloud_metadata_ssrf
    type: cloud_metadata_ssrf
    severity: CRITICAL
    message: "Cloud metadata endpoint SSRF detected"
    conditions:
      - type: pattern
        value: 169\.254\.169\.254|metadata\.amazonaws|compute\.internal
      - type: import
        value: requests
      - type: function
        value: get
    remediation: "Block access to cloud metadata endpoints"

  # Localhost trust bypass via reverse proxy
  - id: localhost_trust_bypass
    type: localhost_trust_bypass
    severity: HIGH
    message: "Localhost trust bypass pattern detected"
    conditions:
      - type: pattern
        value: x-forwarded-for|x-real-ip|proxy.*header
      - type: string
        value: localhost
      - type: string
        value: 127.0.0.1
    remediation: "Never trust proxy headers for access control decisions"

  # SHELL environment variable hijacking
  - id: shell_env_hijack
    type: shell_hijacking
    severity: CRITICAL
    message: "SHELL environment variable hijacking detected"
    conditions:
      - type: import
        value: os
      - type: string
        value: SHELL
      - type: pattern
        value: homebrew|opt/homebrew|trusted.*prefix
      - type: function
        value: system
    remediation: "Never use SHELL from environment in command execution"

  # macOS LaunchAgent persistence
  - id: macos_persistence_launchagent
    type: macos_persistence
    severity: CRITICAL
    message: "macOS LaunchAgent persistence mechanism detected"
    conditions:
      - type: pattern
        value: LaunchAgents|LaunchDaemons|~/Library/LaunchAgents
      - type: string
        value: plist
      - type: function
        value: write
    remediation: "Skills should never modify system persistence mechanisms"

  # Profile shell modification persistence
  - id: shell_profile_persistence
    type: shell_profile_persistence
    severity: HIGH
    message: "Shell profile modification persistence detected"
    conditions:
      - type: pattern
        value: \.bashrc|\.zshrc|\.profile|\.bash_profile
      - type: function
        value: open
      - type: function
        value: append
      - type: function
        value: write
    remediation: "Skills should never modify shell profiles"

  # Hidden CSS instruction injection
  - id: hidden_css_injection
    type: hidden_css_injection
