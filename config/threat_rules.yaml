  # CVE-2026-28466: Gateway node.invoke approval bypass
  - id: cve_2026_28466_approval_bypass
    type: approval_bypass
    severity: CRITICAL
    cve: "CVE-2026-28466"
    cvss: 9.4
    message: "Gateway node.invoke approval bypass detected (CVSS 9.4)"
    conditions:
      - type: pattern
        value: node\.invoke|gateway\.invoke
      - type: pattern
        value: approved|approval|bypass.*check
      - type: string
        value: params
      - type: pattern
        value: system\.run|exec|command
    remediation: "Always validate approval fields from user params"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-28466"
      - "https://github.com/advisories/GHSA-gv46-4xfq-jv58"

  # CVE-2026-27486: Process ownership verification bypass
  - id: cve_2026_27486_process_cleanup
    type: process_ownership_bypass
    severity: MEDIUM
    cve: "CVE-2026-27486"
    message: "Process cleanup without ownership verification detected"
    conditions:
      - type: import
        value: psutil
      - type: import
        value: subprocess
      - type: function
        value: kill
      - type: function
        value: terminate
      - type: pattern
        value: pattern.*match|cmdline.*match
    remediation: "Always verify process ownership before termination"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-27486"

  # CVE-2026-32063: Systemd unit file generation command injection
  - id: cve_2026_32063_systemd_injection
    type: systemd_injection
    severity: HIGH
    cve: "CVE-2026-32063"
    message: "Systemd unit file generation command injection detected"
    conditions:
      - type: pattern
        value: systemd|\.service|\.timer|\.path
      - type: string
        value: Environment=
      - type: pattern
        value: \\n|\\r|\\\\n|\\\\r
      - type: function
        value: write
    remediation: "Sanitize all values before writing systemd unit files"
    references:
      - "https://nvd.nist.gov/vuln/detail/CVE-2026-32063"
      - "https://github.com/advisories/GHSA-vffc-f7r7-rx2w"

  # CVE-2026-26325: rawCommand/command[] mismatch access control bypass
  - id: cve_2026_26325_allowlist_bypass
    type: allowlist_bypass
    severity: HIGH
    cve: "CVE-2026-26325"
    message: "system.run rawCommand/command[] mismatch detected"
    conditions:
